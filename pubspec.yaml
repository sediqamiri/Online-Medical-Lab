name: online_medicine_lab
description: Online Medicine Laboratory Services Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: 
    sdk: flutter
  
  # State Management & Storage
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  
  # Auth & Identity
  crypto: ^3.0.6
  uuid: ^4.4.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  
  # UI Components
  country_code_picker: ^3.0.0
  table_calendar: ^3.1.2
  fluttertoast: ^8.2.4
  
  # Files, Images & PDF
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  pdfrx: ^1.0.0 
  
  # Utilities & Localization
  intl: 0.20.2 
  timezone: ^0.9.2
  flutter_local_notifications: ^17.1.2
  flutter_svg: ^2.0.10+1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_gen_runner: ^5.4.0

flutter:
  uses-material-design: true
  generate: true 
  assets:
    - assets/icon/Logo.svg

flutter_intl:
  enabled: true
